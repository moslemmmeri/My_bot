# my_bot_project/src/my_bot/infrastructure/database/migrations/alembic.ini
# فایل پیکربندی Alembic برای مدیریت مهاجرت‌های دیتابیس

# ----------------------------------------------
# تنظیمات عمومی Alembic
# ----------------------------------------------
# نام فایل راه‌اندازی (env.py)
script_location = .

# نام فایل برای ذخیرهٔ نسخه‌های مهاجرت
# پیش‌فرض: migrations/versions/
version_locations = versions

# فرمت نام فایل‌های نسخه
# مثال: 001_initial.py
version_file_template = %(rev)s_%(slug)s.py

# نام متغیر نسخه در فایل‌ها
version_package = __name__

# نوع نسخه‌بندی: نام‌گذاری شماره‌ای (sequential)
version_path_separator = _

# ----------------------------------------------
# تنظیمات SQLAlchemy
# ----------------------------------------------
# URL اتصال به دیتابیس
# این مقدار در env.py از پیکربندی پروژه خوانده می‌شود
sqlalchemy.url = sqlite:///./dev.db

# تنظیمات اضافی SQLAlchemy (اختیاری)
# sqlalchemy.echo = true
# sqlalchemy.pool_size = 5
# sqlalchemy.max_overflow = 10

# ----------------------------------------------
# تنظیمات لاگ‌گیری
# ----------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt = %Y-%m-%d %H:%M:%S

# ----------------------------------------------
# تنظیمات ویژه برای SQLite (اختیاری)
# ----------------------------------------------
# برای استفاده از SQLite در محیط توسعه، می‌توان فایل زیر را فعال کرد:
# sqlalchemy.url = sqlite:///./dev.db

# برای PostgreSQL در محیط تولید، از متغیر محیطی استفاده کنید:
# sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

# ----------------------------------------------
# تنظیمات برای تولید خودکار مهاجرت (اختیاری)
# ----------------------------------------------
# برای تولید خودکار مهاجرت از روی مدل‌ها، می‌توان از
# --autogenerate با دستور revision استفاده کرد.

# ----------------------------------------------
# توضیحات تکمیلی
# ----------------------------------------------
# این فایل با استفاده از Alembic برای مدیریت نسخه‌های دیتابیس
# پیکربندی شده است. برای استفاده از آن:
#
# 1. محیط مجازی را فعال کنید
# 2. متغیر محیطی DATABASE_URL را تنظیم کنید
# 3. از دستورات زیر استفاده کنید:
#
#    # ایجاد یک نسخه جدید (خالی)
#    alembic revision -m "description"
#
#    # ایجاد نسخه با اتوماتیک
#    alembic revision --autogenerate -m "description"
#
#    # ارتقاء به آخرین نسخه
#    alembic upgrade head
#
#    # بازگشت به نسخه قبلی
#    alembic downgrade -1
#
#    # نمایش تاریخچه نسخه‌ها
#    alembic history --verbose