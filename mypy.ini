# my_bot_project/mypy.ini
# ============================================================
#                   تنظیمات Mypy
# ============================================================

[mypy]
# نسخه پایتون هدف
python_version = 3.9

# مسیرهای جستجو برای فایل‌های کد
mypy_path = src

# ============================================================
#                   تنظیمات پایه
# ============================================================

# فعال‌سازی هشدارها
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
warn_no_return = True
warn_redundant_casts = True
warn_unreachable = True

# بررسی‌های دقیق
disallow_untyped_defs = True
disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
strict_equality = True
strict_optional = True

# تنظیمات import
ignore_missing_imports = False
follow_imports = normal
follow_imports_for_stubs = True

# ============================================================
#                   پوشه‌های استثنا
# ============================================================

exclude =
    migrations/
    tests/
    docs/
    scripts/
    venv/
    .venv/
    .env/
    build/
    dist/
    .eggs/
    *.egg-info/

# ============================================================
#                   تنظیمات پیشرفته
# ============================================================

# نمایش خطاها به صورت کامل
show_error_context = True
show_column_numbers = True
show_absolute_path = True
color_output = True
pretty = True

# بررسی فایل‌های پیکربندی
check_untyped_defs = True
no_implicit_reexport = True

# ============================================================
#                   نادیده گرفتن خطاها
# ============================================================

ignore_errors = False
ignore_missing_imports = False

# ============================================================
#                   تنظیمات پلاگین‌ها
# ============================================================

# پشتیبانی از Pydantic
plugins =
    pydantic.mypy

# ============================================================
#                   تنظیمات ماژول‌های خاص
# ============================================================

[mypy-aiogram.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-aiosqlite.*]
ignore_missing_imports = True

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-python_dotenv.*]
ignore_missing_imports = True

[mypy-python_dateutil.*]
ignore_missing_imports = True

[mypy-pytz.*]
ignore_missing_imports = True

# ============================================================
#              فایل‌های تست و اسکریپت‌ها
# ============================================================

[mypy-src.tests.*]
ignore_errors = True
disallow_untyped_defs = False
disallow_untyped_calls = False
check_untyped_defs = False

[mypy-src.scripts.*]
ignore_errors = True
disallow_untyped_defs = False
disallow_untyped_calls = False
check_untyped_defs = False

# ============================================================
#              فایل‌های مهاجرت (Migrations)
# ============================================================

[mypy-src.migrations.*]
ignore_errors = True
disallow_untyped_defs = False
disallow_untyped_calls = False
check_untyped_defs = False

# ============================================================
#           تنظیمات برای فایل‌های __init__.py
# ============================================================

[mypy-src.*.__init__]
allow_untyped_defs = True
disallow_untyped_defs = False
disallow_untyped_calls = False
check_untyped_defs = False

# ============================================================
#              تنظیمات گزارش
# ============================================================

# نمایش خلاصه گزارش
show_error_codes = True
show_traceback = True
incremental = True
cache_dir = .mypy_cache

# ============================================================
#                    پایان فایل mypy.ini
# ============================================================